spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/vecino_merchant
    username: root
    password: 123456
  sql:
    init:
      mode: always
  data:
    jdbc:
      mapping:
        underscore-to-lower-camel-case: true
  jackson:
    default-property-inclusion: always
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB  # 单文件最大10M
      max-request-size: 20MB # 单次请求最大20M

logging:
  level:
    sql: debug
    org:
      example: debug
  pattern:
    console: '%-5level %C.%M[%line] - %msg%n'
springdoc:
  api-docs:
    enabled: true # 开启OpenApi接口
    path: /v3/api-docs  # 自定义路径，默认为 "/v3/api-docs"
  swagger-ui:
    enabled: true # 开启swagger界面，依赖OpenApi，需要OpenApi同时开启
    path: /swagger-ui/index.html # 自定义路径，默认为"/swagger-ui/index.html"

upload:
  local-path: E:/vecinopictures/  # 图片存储绝对路径
  visit-prefix: /pictures/        # 图片浏览器访问前缀
#debug: true

my:
  secretkey: ${JWT_SECRET_KEY}
  aliyunkey: ${ALIYUN_API_KEY}